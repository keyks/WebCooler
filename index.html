<!DOCTYPE html>
<html lang="zh-CN" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 在首屏绘制前同步应用主题，消除深浅色切换的闪白/闪黑（FOUC）
      (function () {
        try {
          var t = localStorage.getItem('webcooler_theme');
          var dark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <title>WebCooler — 万能 Web 前端模板与交互效果库</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 transition-colors min-h-screen">
    <div id="app"></div>
    <script type="module" src="./src/js/pages/home.js"></script>
  </body>
</html>
