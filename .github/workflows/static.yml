# 单分支部署：监听 main，自动构建并发布到 GitHub Pages
name: Deploy static content to Pages

on:
  # 推送/合并到 main 时自动部署
  push:
    branches: ["main"]
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 赋予 GITHUB_TOKEN 部署 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，不取消进行中的任务
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
